# ── Region-relative offsets ─────────────────────────────────────────────────

[[offset]]
# `.cc_delete`'s `jbra DeleteObject` site. Shape-dependent as of retro-fix
# item 4: the AF_* DEBUG asserts (AF_SET_FIELD/AF_BACK) sit between AnimateSprite
# and .cc_delete, so the debug-shape offset (0x15E) exceeds the plain (0x104).
name = "CC_DELETE_OFF"
sym = "AnimateSprite.cc_delete"
region = "animate"
per_shape = true
tests = ["animate_port"]

[[offset]]
# `RefreshSpritePieceCount:` structural anchor. Shape-dependent as of retro-fix
# item 4 (the AF_* DEBUG asserts precede this proc within the animate region).
name = "REFRESH_OFF"
sym = "RefreshSpritePieceCount"
region = "animate"
per_shape = true
tests = ["animate_port"]

[[offset]]
# `RingCollision`'s spot-check + outbound-consumer target. Per-shape: the
# debug-only assert block sits between the region base and this proc.
name = "RINGCOL_OFF"
sym = "RingCollision"
region = "rings"
per_shape = true
tests = ["rings_port"]

[[offset]]
# The outbound `bsr.w Sound_PlaySFX` proof target. Shape-dependent as of
# retro-fix batch 2: Sound_PlayMusic's two DEBUG song-id asserts (finding 1)
# sit between the region base and Sound_PlaySFX, so the debug offset (0x1B0)
# exceeds the plain (0x100).
name = "SOUND_PLAY_SFX_OFF"
sym = "Sound_PlaySFX"
region = "sound_api"
per_shape = true
tests = ["sound_api_port"]

[[offset]]
# The consumer's `dc.l Sine_Table` fixup target.
name = "SINE_TABLE_OFF"
sym = "Sine_Table"
region = "math"
tests = ["math_port"]

[[offset]]
# The consumer's second `bsr.w` target.
name = "FLUSH_VDP_SHADOW_OFF"
sym = "Flush_VDP_Shadow"
region = "vdp_init"
tests = ["vdp_init_port"]

[[offset]]
# The consumer's `move.l #HBlank_Null` imm32 target.
name = "HBLANK_NULL_OFF"
sym = "HBlank_Null"
region = "hblank"
tests = ["hblank_port"]

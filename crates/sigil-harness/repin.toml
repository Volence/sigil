# ── Region-relative offsets ─────────────────────────────────────────────────

[[offset]]
# `.cc_delete`'s `jbra DeleteObject` site.
name = "CC_DELETE_OFF"
sym = "AnimateSprite.cc_delete"
region = "animate"
tests = ["animate_port"]

[[offset]]
# `RefreshSpritePieceCount:` structural anchor.
name = "REFRESH_OFF"
sym = "RefreshSpritePieceCount"
region = "animate"
tests = ["animate_port"]

[[offset]]
# `RingCollision`'s spot-check + outbound-consumer target. Per-shape: the
# debug-only assert block sits between the region base and this proc.
name = "RINGCOL_OFF"
sym = "RingCollision"
region = "rings"
per_shape = true
tests = ["rings_port"]

[[offset]]
# The outbound `bsr.w Sound_PlaySFX` proof target (`base + 0x100` today).
name = "SOUND_PLAY_SFX_OFF"
sym = "Sound_PlaySFX"
region = "sound_api"
tests = ["sound_api_port"]

[[offset]]
# The consumer's `dc.l Sine_Table` fixup target.
name = "SINE_TABLE_OFF"
sym = "Sine_Table"
region = "math"
tests = ["math_port"]

[[offset]]
# The consumer's second `bsr.w` target.
name = "FLUSH_VDP_SHADOW_OFF"
sym = "Flush_VDP_Shadow"
region = "vdp_init"
tests = ["vdp_init_port"]

[[offset]]
# The consumer's `move.l #HBlank_Null` imm32 target.
name = "HBLANK_NULL_OFF"
sym = "HBlank_Null"
region = "hblank"
tests = ["hblank_port"]

# repin.toml — the declarative pin manifest (tranche-10 step 0, D-T10.2).
#
# `cargo run -p sigil-harness --bin repin` resolves every entry against BOTH
# aeon listings (s4.lst / s4.debug.lst) and regenerates src/pins.rs. Order is
# load-bearing: pins.rs emits in manifest order. Adding a region/symbol is a
# manifest edit + regenerate — the tool never re-pins a NEW region into
# existence on its own.
#
# `tests` lists name the test BINARIES that consume the pin — printed as the
# rerun hint when the pin moves. (dplc_port/core_port are tranche 10's
# to-be-written binaries; their regions are pinned ahead per the handoff.)
#
# Inventory transcribed 2026-07-10 from the hand-typed pins in:
#   sigil-cli tests: rings_port collision_port collision_lookup_port
#     game_loop_port test_objects_port sound_api_port animate_port
#     sonic_anims_port particle_anims_port controllers_port math_port
#     vdp_init_port hblank_port act_descriptor_port
#   sigil-harness tests: m1d_rom m1d_debug_rom m1c_vector_table
#     (+ mixed_dac_rom's ASSEMBLED_LEN twins)
# Every value was cross-checked against both listings before ratifying the
# start/end symbols below.

[rom]
# The listing END-line address per shape — the assembled (pre-convsym) ROM
# lengths ASSEMBLED_LEN / DEBUG_ASSEMBLED_LEN.
end_symbol = "__END__"
tests = ["m1d_rom", "m1d_debug_rom", "mixed_dac_rom"]

# ── Gated regions, engine.inc ladder order ──────────────────────────────────

[[region]]
name = "vdp_init"
start = "VDP_Shadow_Init"
end = "Init_DMA_Queue"
gate = "SIGIL_EMP_VDP_INIT"
tests = ["vdp_init_port"]

[[region]]
name = "hblank"
start = "HBlank_Dispatch"
end = "Read_Controllers"
gate = "SIGIL_EMP_HBLANK"
# m1c_vector_table stubs HBlank_Dispatch (= this region's base).
tests = ["hblank_port", "m1c_vector_table"]

[[region]]
name = "controllers"
start = "Read_Controllers"
end = "GameLoop"
gate = "SIGIL_EMP_CONTROLLERS"
tests = ["controllers_port"]

[[region]]
name = "game_loop"
start = "GameLoop"
end = "S4LZ_DecompressDict"
gate = "SIGIL_EMP_GAME_LOOP"
tests = ["game_loop_port"]

[[region]]
name = "math"
start = "GetSineCosine"
end = "Perform_DPLC"
gate = "SIGIL_EMP_MATH"
tests = ["math_port"]

[[region]]
name = "dplc"
start = "Perform_DPLC"
end = "InitObjectRAM"
gate = "SIGIL_EMP_DPLC"
tests = ["dplc_port"]

[[region]]
# Shape-DEPENDENT length: the debug surplus is the assert transliterations +
# the Debug_AssertObjLoop proc (rings precedent).
name = "core"
start = "InitObjectRAM"
end = "InitSpriteSystem"
gate = "SIGIL_EMP_CORE"
tests = ["core_port"]

[[region]]
# Shape-INDEPENDENT length ($420 both shapes — no __DEBUG__ code); base
# slides with core's debug surplus. Downstream neighbour of core.
name = "sprites"
start = "InitSpriteSystem"
end = "AnimateSprite"
gate = "SIGIL_EMP_SPRITES"
tests = ["sprites_port"]

[[region]]
name = "animate"
start = "AnimateSprite"
end = "TouchResponse"
gate = "SIGIL_EMP_ANIMATE"
# test_objects_port pins AnimateSprite (= this region's base) as a call target.
tests = ["animate_port", "test_objects_port"]

[[region]]
name = "collision"
start = "TouchResponse"
end = "RingBuffer_Add"
gate = "SIGIL_EMP_COLLISION"
tests = ["collision_port"]

[[region]]
# Shape-DEPENDENT length (the debug-only assert block) — the campaign's first.
name = "rings"
start = "RingBuffer_Add"
end = "Collected_Init"
gate = "SIGIL_EMP_RINGS"
tests = ["rings_port"]

[[region]]
# Shape-DEPENDENT length (the 11 assert sites + 3 __DEBUG__ blocks). Immediate
# downstream neighbour of rings (rings ends at Collected_Init = this base); ends
# at children.asm's first label. The ratifying demand for the diagnostics
# construct.
name = "entity_window"
start = "Collected_Init"
end = "PopulateSpawnedPieceCount"
gate = "SIGIL_EMP_ENTITY_WINDOW"
tests = ["entity_window_port"]

[[region]]
# Shape-INVARIANT length ($9E both shapes — no asserts, no __DEBUG__; the
# cleanest region since dplc). The spawn-seam callee of entity_window's
# TrySpawnObject and the sole consumer of AllocDynamic here. Sits after
# children.asm (unported) and before plane_buffer.asm; its start doubles as the
# `Load_Object` symbol that entity_window_port pins (via LOAD_OBJECT.plain_base,
# the RingBuffer_Add/RINGS precedent).
name = "load_object"
start = "Load_Object"
end = "Plane_Buffer_Reset"
gate = "SIGIL_EMP_LOAD_OBJECT"
tests = ["load_object_port", "entity_window_port"]

[[region]]
# Tranche 16 — the 2D block-decompression tile cache (§4.7). Biggest region yet
# ($924 plain / $9DC debug), section.emp's paired streaming sibling. SHAPE-VARYING:
# the debug shape carries +$B8 (the .raw_direct assert block). End is the next
# placement: collision_lookup's Collision_GetType (engine.inc:313; end-is-next-
# placement, the load_object precedent).
name = "tile_cache"
start = "Tile_Cache_GetTile"
end = "Collision_GetType"
gate = "SIGIL_EMP_TILE_CACHE"
tests = ["tile_cache_port"]

[[region]]
name = "collision_lookup"
start = "Collision_GetType"
end = "Collision_ProbeDown"
gate = "SIGIL_EMP_COLLISION_LOOKUP"
tests = ["collision_lookup_port"]

[[region]]
# Tranche 15 — the section-streaming engine (§4). Biggest region yet. End is the
# next placement: camera.asm's Camera_Init (engine.inc:330; end-is-next-placement,
# the load_object precedent). Plain $513E..$5528 = $3EA bytes.
name = "section"
start = "Section_Init"
end = "Camera_Init"
gate = "SIGIL_EMP_SECTION"
tests = ["section_port"]

[[region]]
# The one region whose end carries no listing symbol: the include's content ends
# unlabeled after Sound_FadeIn (next placement is org $10000 / sound_debug.asm).
# Shape-DEPENDENT length as of retro-fix batch 2 (the DEBUG song-id + SFX-ring
# asserts, findings 1/2, grow the debug shape): a literal `len` + `debug_len`
# override — NOT an `end` symbol, because a real end label would ship in the
# release convsym appendix and perturb the byte-identical plain ROM. Re-derive
# `debug_len` from repin --verbose (= the debug resume org − debug base) on any
# sound_api debug-shape byte change.
name = "sound_api"
start = "Sound_PostByte"
len = 0x1E4
debug_len = 0x2DA
gate = "SIGIL_EMP_SOUND_API"
tests = ["sound_api_port"]


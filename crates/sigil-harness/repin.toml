tests = ["particle_anims_port", "test_objects_port"]

[[region]]
name = "act_descriptor"
start = "OJZ_Act1_Descriptor"
end = "OJZ_Sec0_Blocks"
gate = "SIGIL_EMP_ACT_DESCRIPTOR"
tests = ["act_descriptor_port"]


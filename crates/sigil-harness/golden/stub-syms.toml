# External 68k leaf-stub symbols referenced by Region A/B but DEFINED
# OUTSIDE A+B. These are the DEFINITIVE set: finalized in Task 5 by assembling
# regions A+B in isolation and stubbing exactly the symbols that survive as
# unresolved leaves (every A/B-internal symbol resolves without a stub).
# Values are hex, taken from a fresh asl build's s4.lst.
#
# Provenance / why each is a leaf:
#   * SND_ENGINE_TABLE_BANK — main.asm (= MovingTrucks_Bank_Start>>15);
#     referenced by the driver (z80_sound_driver.asm `ld a,SND_ENGINE_TABLE_BANK`).
#   * SND_<sample>_{BANK,PTR,LEN} — games/.../data/sound/dac_samples.asm (10
#     DAC samples: BLIP/KICK/SNARE/HAT + the six S3K drums); read by region B's
#     dac_sample_tab.asm as the DacSample records.
#   * Sfx_XX — games/.../data/sound/sfx/sfx_XX.asm blob labels; windowed by
#     region B's sfx_blob_win_tab.asm via sfx_winptr(Sfx_XX).
#
# CHANGES vs the Task-3 seed:
#   - DROPPED SFX_BLOB_BANK: it is NOT an external leaf. It is defined INSIDE
#     region A (sound_sfx.asm: `SFX_BLOB_BANK = sfx_bankid(Sfx_33)`) and resolves
#     internally once Sfx_33 is stubbed — seeding it would have masked a real dep.
#   - ADDED the six S3K DAC samples (18 syms) that dac_sample_tab.asm also reads
#     (the seed only carried BLIP/KICK/SNARE/HAT).
#   - ADDED the nine Sfx_XX blob labels (the real unresolved leaves the closure
#     loop surfaced from sfx_blob_win_tab.asm).

